# ── HTTP: ACME challenge + HTTPS'e yönlendirme ────────────────────────────────
server {
    listen 80;
    server_name app.altugengin.com app.altugengin.cloud;

    # Let's Encrypt doğrulama klasörü
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://app.altugengin.com$request_uri;
    }
}

# ── HTTPS: app.altugengin.cloud → app.altugengin.com yönlendirme ──────────────
server {
    listen 443 ssl;
    server_name app.altugengin.cloud;

    ssl_certificate     /etc/letsencrypt/live/app.altugengin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.altugengin.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    return 301 https://app.altugengin.com$request_uri;
}

# ── HTTPS: Ana site ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name app.altugengin.com;

    ssl_certificate     /etc/letsencrypt/live/app.altugengin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.altugengin.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # HSTS (6 ay)
    add_header Strict-Transport-Security "max-age=15768000" always;

    # Web container'a proxy (web kendi içinde /api/ → api:3001 yapar)
    location / {
        proxy_pass            http://web:80;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto https;
        proxy_read_timeout    60s;
    }
}
