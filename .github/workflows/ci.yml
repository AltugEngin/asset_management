name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.7.1"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Bağımlılıkları yükle
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build

      - name: Migration (test DB)
        run: |
          echo "DATABASE_URL=postgresql://test_user:test_pass@localhost:5432/test_db" > apps/api/.env
          pnpm --filter api db:migrate

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Repo adını küçük harfe çevir
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Docker Buildx kurulum
        uses: docker/setup-buildx-action@v3

      - name: GHCR giriş
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API image build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/api:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Web image build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/web:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
