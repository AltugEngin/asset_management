name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: VPS'e SSH ile deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_REPOSITORY,GITHUB_SHA
          script: |
            set -e
            cd /opt/asset_management

            # .env değişkenlerini güncelle
            export IMAGE_TAG=$GITHUB_SHA
            export GITHUB_REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')

            # Yeni image'ları çek
            docker compose -f docker-compose.prod.yml pull

            # Migration'ı önce çalıştır
            docker compose -f docker-compose.prod.yml run --rm api \
              node dist/db/migrate.js

            # Servisleri güncelle (rolling)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Eski image'ları temizle
            docker image prune -f

            echo "Deploy tamamlandı: $IMAGE_TAG"
