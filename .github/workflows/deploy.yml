name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: VPS'e SSH ile deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_REPOSITORY,GITHUB_SHA
          script: |
            set -e

            REPO_DIR=/opt/asset_management
            REPO_URL="https://${{ secrets.GHCR_USER }}:${{ secrets.GHCR_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"

            # Sadece config dosyalarını sparse checkout ile çek (kaynak kodu VPS'te olmayacak)
            if [ -d "$REPO_DIR/.git" ]; then
              echo "→ Config dosyaları güncelleniyor (sparse checkout)..."
              cd $REPO_DIR
              git fetch origin
              git checkout main
              git pull origin main
            else
              echo "→ Config dosyaları klonlanıyor (sparse checkout, .env korunuyor)..."
              # .env varsa yedekle
              [ -f "$REPO_DIR/.env" ] && cp "$REPO_DIR/.env" /tmp/.env_backup
              rm -rf $REPO_DIR
              git clone --no-checkout --depth 1 --filter=blob:none $REPO_URL $REPO_DIR
              cd $REPO_DIR
              git sparse-checkout init --cone
              git sparse-checkout set docker-compose.prod.yml docker scripts
              git checkout main
              # .env'i geri yükle
              [ -f /tmp/.env_backup ] && cp /tmp/.env_backup $REPO_DIR/.env
            fi

            cd $REPO_DIR

            # .env değişkenlerini güncelle
            export IMAGE_TAG=$GITHUB_SHA
            export GITHUB_REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')

            # GHCR'a login ol
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            # Yeni image'ları çek
            docker compose -f docker-compose.prod.yml pull

            # Migration'ı önce çalıştır
            docker compose -f docker-compose.prod.yml run --rm api \
              node dist/db/migrate.js

            # Servisleri güncelle (rolling)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Eski image'ları temizle
            docker image prune -f

            echo "Deploy tamamlandı: $IMAGE_TAG"
